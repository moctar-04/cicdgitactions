name: Test Python

on:
 push:
  branches:
   - main

jobs:

 test:

  runs-on: ubuntu-latest

  steps:

  - uses: actions/checkout@v4
  - name: Installer Python
    uses: actions/setup-python@v5
    with:
     python-version: "3.12"


  - name: Installer pytest
    run:
     pip install pytest

  - name: Executer tests
    run:
     pytest
